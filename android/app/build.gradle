plugins {
    id "com.android.application"
    // Use the full ID for the Kotlin plugin to help Gradle identify the version
    id "org.jetbrains.kotlin.android" 
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.example.expense_tracker"
    compileSdk 34

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "com.example.expense_tracker"
        minSdkVersion 21
        targetSdkVersion 34
        versionCode 1
        versionName "1.0"
    }

    // ADD THIS BLOCK:
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    // ADD THIS BLOCK:
    kotlinOptions {
        jvmTarget = '17'
    }

    buildTypes {
        release {
            // Using debug config for now so the build doesn't fail due to missing keys
            signingConfig signingConfigs.debug 
        }
    }
}

flutter {
    source '../..'
}
